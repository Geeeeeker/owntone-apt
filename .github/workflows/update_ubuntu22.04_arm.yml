name: Update Ubuntu repository

on:
  workflow_dispatch:
    inputs:
      release:
        description: Create release?
        required: true
        type: boolean

env:
  RELFILE: ubuntu_repo.tar.gz
  RELNOTESFILE: relnotes.txt
  # 定义要支持的 Ubuntu 发行版（可根据需要增删）
  DISTROS: "focal jammy noble"
  ARCH: "arm64"

jobs:
  update_repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Prepare directories
        run: |
          mkdir -p dl
          mkdir -p dist
          mkdir -p repo/ubuntu/conf   # 用于存放 reprepro 配置
          mkdir -p repo/ubuntu/incoming

      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -yq reprepro



      # 可选：如果你希望从之前的 release 中下载已有的仓库快照，可恢复此步
      # - name: Download and unpack latest repo
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     gh release download --dir dl --pattern $RELFILE
      #     tar xzf dl/$RELFILE --directory repo/ubuntu

      # 创建 reprepro 配置文件（conf/distributions）
      - name: Create reprepro distributions config
        working-directory: repo/ubuntu
        run: |
          cat > conf/distributions <<EOF
          $(for dist in ${{ env.DISTROS }}; do
            echo "Origin: Ubuntu"
            echo "Label: Ubuntu"
            echo "Codename: $dist"
            echo "Architectures: ${{ env.ARCH }} source"
            echo "Components: main"
            echo "Description: OwnTone Ubuntu $dist repository"
            echo "SignWith: $(gpg --list-secret-keys --keyid-format LONG | grep -oP '(?<=sec\s+rsa\d+/)[A-F0-9]+' | head -1)"
            echo ""
          done)
          EOF
          echo "Generated conf/distributions:"
          cat conf/distributions

      # 下载由另一个工作流构建好的 Ubuntu arm64 deb 包
      # 假设另一个工作流名为 build_ubuntu.yml，生成的 artifact 目录为 ubuntu-<distro>-arm64
      - name: Download Ubuntu packages
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build_ubuntu.yml          # 请替换为实际构建工作流名称
          workflow_conclusion: success
          path: dl

      # 将下载的包移入 incoming 目录，并使用 reprepro 收录
      - name: Process incoming packages
        working-directory: repo/ubuntu
        env:
          DPKGDIR: ../../dl
        run: |
          # 遍历每个 Ubuntu 发行版，将对应目录下的 .deb 文件移入 incoming
          for dist in ${{ env.DISTROS }}; do
            artifact_dir="$DPKGDIR/ubuntu-${dist}-${{ env.ARCH }}"
            if [ -d "$artifact_dir" ]; then
              echo "Moving packages for $dist from $artifact_dir"
              mv "$artifact_dir"/*.deb var/incoming/ 2>/dev/null || true
            fi
          done

          # 使用 reprepro 处理 incoming 目录中的包，并入仓库
          # 注意：需要确保 reprepro 能找到 conf/distributions
          reprepro processincoming default

      # 打包整个仓库（db、publish、conf 等）
      - name: Pack repository
        run: |
          tar czf dist/$RELFILE --directory repo/ubuntu/ .

      # 生成发行说明
      - name: Create release notes
        working-directory: repo/ubuntu
        run: |
          echo -e "Distro | Section | Package\n------ | ------- | -------" > ../../$RELNOTESFILE
          for dist in ${{ env.DISTROS }}; do
            echo "## $dist" >> ../../$RELNOTESFILE
            reprepro list $dist >> ../../$RELNOTESFILE
          done
          cat ../../$RELNOTESFILE

      - name: Create release
        if: ${{ github.event.inputs.release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ubuntu_repo_rev$GITHUB_RUN_NUMBER" \
            --title "Ubuntu repo revision $GITHUB_RUN_NUMBER" \
            --notes-file $RELNOTESFILE \
            dist/$RELFILE
