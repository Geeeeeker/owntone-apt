name: Build Owntone Debian Package

on:
  # 取消定时编译，改用 push 或手动触发（可根据需要选择）
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [jammy]
        arch: [amd64, i386]   # i386 架构需要特别处理
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pbuilder and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pbuilder debootstrap devscripts

      - name: Prepare pbuilder base.tgz (if not exists)
        run: |
          sudo pbuilder create \
            --distribution ${{ matrix.distro }} \
            --architecture ${{ matrix.arch }} \
            --othermirror "deb http://archive.ubuntu.com/ubuntu ${{ matrix.distro }} universe" \
            --debootstrapopts --variant=buildd

      - name: Build package with pbuilder
        run: |
          cd owntone-server/debian   # 根据您的目录结构调整
          # 假设 dsc 文件位于上一层
          sudo pbuilder build \
            --distribution ${{ matrix.distro }} \
            --architecture ${{ matrix.arch }} \
            --othermirror "deb http://archive.ubuntu.com/ubuntu ${{ matrix.distro }} universe" \
            ../*.dsc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: owntone-${{ matrix.distro }}-${{ matrix.arch }}
          path: /var/cache/pbuilder/result/*.deb
