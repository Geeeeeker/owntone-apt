name: Create Debian packages

on:
  workflow_dispatch:
    inputs:
      raspbian-bullseye-armhf:
        type: boolean
      raspbian-bookworm-armhf:
        type: boolean
      raspbian-trixie-armhf:
        type: boolean
      raspberrypi-bullseye-arm64:
        type: boolean
      raspberrypi-bookworm-arm64:
        type: boolean
      raspberrypi-trixie-arm64:
        type: boolean
      debian-bullseye-amd64:
        type: boolean
      debian-bookworm-amd64:
        type: boolean
      debian-trixie-amd64:
        type: boolean
      debian-forky-amd64:
        type: boolean
  schedule:
    # Rebuild once a month. Could be 0 0 1, but Github servers are probably
    # quite busy at that time.
    - cron: '7 7 24 * *'

# Use FLAGS to only build sources for one of the packages. The below could also
# be imported from files, but that would add a checkout step, plus makes it more
# important to support multiline json as per:
# https://github.community/t/set-output-truncates-multiline-strings/16852
env:
  raspbian-bullseye-armhf: '{"image":"raspbian-bullseye-armhf","OS":"raspbian","DIST":"bullseye","ARCH":"armhf","FLAGS":"-- --binary-arch"}'
  raspbian-bookworm-armhf: '{"image":"raspbian-bookworm-armhf","OS":"raspbian","DIST":"bookworm","ARCH":"armhf","FLAGS":"-- --binary-arch"}'
  raspbian-trixie-armhf: '{"image":"raspbian-trixie-armhf","OS":"raspbian","DIST":"trixie","ARCH":"armhf","FLAGS":"-- --binary-arch"}'
  raspberrypi-bullseye-arm64: '{"image":"raspberrypi-bullseye-arm64","OS":"raspberrypi","DIST":"bullseye","ARCH":"arm64","FLAGS":"-- --binary-arch"}'
  raspberrypi-bookworm-arm64: '{"image":"raspberrypi-bookworm-arm64","OS":"raspberrypi","DIST":"bookworm","ARCH":"arm64","FLAGS":"-- --binary-arch"}'
  raspberrypi-trixie-arm64: '{"image":"raspberrypi-trixie-arm64","OS":"raspberrypi","DIST":"trixie","ARCH":"arm64","FLAGS":"-- --binary-arch"}'
  debian-bullseye-amd64: '{"image":"debian-bullseye-amd64","OS":"debian","DIST":"bullseye","ARCH":"amd64","FLAGS":"-- --binary-arch"}'
  debian-bookworm-amd64: '{"image":"debian-bookworm-amd64","OS":"debian","DIST":"bookworm","ARCH":"amd64","FLAGS":"-- --binary-arch"}'
  debian-trixie-amd64: '{"image":"debian-trixie-amd64","OS":"debian","DIST":"trixie","ARCH":"amd64","FLAGS":"-- --binary-arch"}'
  debian-forky-amd64: '{"image":"debian-forky-amd64","OS":"debian","DIST":"forky","ARCH":"amd64","FLAGS":"-- --binary-arch"}'

jobs:
  prepare:
    name: Plan jobs
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
      packages: ${{ steps.set-packages.outputs.packages }}
    env:
      BUILDTARGETS: buildtargets.json
      BUILD_raspbian-bullseye-armhf: ${{ github.event.inputs.raspbian-bullseye-armhf || 'true' }}
      BUILD_raspbian-bookworm-armhf: ${{ github.event.inputs.raspbian-bookworm-armhf || 'true' }}
      BUILD_raspbian-trixie-armhf: ${{ github.event.inputs.raspbian-trixie-armhf || 'true' }}
      BUILD_raspberrypi-bullseye-arm64: ${{ github.event.inputs.raspberrypi-bullseye-arm64 || 'true' }}
      BUILD_raspberrypi-bookworm-arm64: ${{ github.event.inputs.raspberrypi-bookworm-arm64 || 'true' }}
      BUILD_raspberrypi-trixie-arm64: ${{ github.event.inputs.raspberrypi-trixie-arm64 || 'true' }}
      BUILD_debian-bullseye-amd64: ${{ github.event.inputs.debian-bullseye-amd64 || 'true' }}
      BUILD_debian-bookworm-amd64: ${{ github.event.inputs.debian-bookworm-amd64 || 'true' }}
      BUILD_debian-trixie-amd64: ${{ github.event.inputs.debian-trixie-amd64 || 'true' }}
      BUILD_debian-forky-amd64: ${{ github.event.inputs.debian-forky-amd64 || 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Add raspbian-bullseye-armhf
        if: ${{ env.BUILD_raspbian-bullseye-armhf == 'true' }}
        run: echo -n '${{ env.raspbian-bullseye-armhf }},' >> $BUILDTARGETS

      - name: Add raspbian-bookworm-armhf
        if: ${{ env.BUILD_raspbian-bookworm-armhf == 'true' }}
        run: echo -n '${{ env.raspbian-bookworm-armhf }},' >> $BUILDTARGETS

      - name: Add raspbian-trixie-armhf
        if: ${{ env.BUILD_raspbian-trixie-armhf == 'true' }}
        run: echo -n '${{ env.raspbian-trixie-armhf }},' >> $BUILDTARGETS

      - name: Add raspberrypi-bullseye-arm64
        if: ${{ env.BUILD_raspberrypi-bullseye-arm64 == 'true' }}
        run: echo -n '${{ env.raspberrypi-bullseye-arm64 }},' >> $BUILDTARGETS

      - name: Add raspberrypi-bookworm-arm64
        if: ${{ env.BUILD_raspberrypi-bookworm-arm64 == 'true' }}
        run: echo -n '${{ env.raspberrypi-bookworm-arm64 }},' >> $BUILDTARGETS

      - name: Add raspberrypi-trixie-arm64
        if: ${{ env.BUILD_raspberrypi-trixie-arm64 == 'true' }}
        run: echo -n '${{ env.raspberrypi-trixie-arm64 }},' >> $BUILDTARGETS

      - name: Add debian-bullseye-amd64
        if: ${{ env.BUILD_debian-bullseye-amd64 == 'true' }}
        run: echo -n '${{ env.debian-bullseye-amd64 }},' >> $BUILDTARGETS

      - name: Add debian-bookworm-amd64
        if: ${{ env.BUILD_debian-bookworm-amd64 == 'true' }}
        run: echo -n '${{ env.debian-bookworm-amd64 }},' >> $BUILDTARGETS

      - name: Add debian-trixie-amd64
        if: ${{ env.BUILD_debian-trixie-amd64 == 'true' }}
        run: echo -n '${{ env.debian-trixie-amd64 }},' >> $BUILDTARGETS

      - name: Add debian-forky-amd64
        if: ${{ env.BUILD_debian-forky-amd64 == 'true' }}
        run: echo -n '${{ env.debian-forky-amd64 }},' >> $BUILDTARGETS

      - name: Define targets
        id: set-targets
        run: |
          test -f $BUILDTARGETS || { echo "No build targets selected"; exit 1; }
          echo -e "`cat $BUILDTARGETS`\n"
          echo "targets=[`cat $BUILDTARGETS`]" >> "$GITHUB_OUTPUT"

      - name: Define packages
        id: set-packages
        run: |
          echo "packages=$(cat pkginfo.json | tr -d '\n')" >> "$GITHUB_OUTPUT"

  setup:
    name: Setup ${{ matrix.targets.image }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        targets: ${{ fromJSON(needs.prepare.outputs.targets) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare directories
        run: |
          mkdir dl
          mkdir cache

      - name: Install pbuilder, Debian tools, keyrings
        run: |
          sudo apt-get update
          sudo apt-get install -yq pbuilder qemu-user-static debian-archive-keyring
          wget -O dl/raspbian-archive-keyring.deb http://archive.raspbian.org/raspbian/pool/main/r/raspbian-archive-keyring/raspbian-archive-keyring_20120528.4_all.deb
          sudo dpkg -i dl/raspbian-archive-keyring.deb
          wget -O dl/raspberrypi-archive-keyring.deb http://archive.raspberrypi.org/debian/pool/main/r/raspberrypi-archive-keyring/raspberrypi-archive-keyring_2025.1+rpt1_all.deb
          sudo dpkg -i dl/raspberrypi-archive-keyring.deb

      - name: Cache pbuilder image
        id: cache-image
        uses: actions/cache@v5
        with:
          path: cache/${{ matrix.targets.image }}-base.tgz
          key: ${{ matrix.targets.image }}

      - name: Create pbuilder image
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          sudo OS=${{ matrix.targets.OS }} DIST=${{ matrix.targets.DIST }} ARCH=${{ matrix.targets.ARCH }} pbuilder create --configfile pbuilderrc
      - name: Or update image from cache
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: |
          sudo cp cache/${{ matrix.targets.image }}-base.tgz /var/cache/pbuilder/
          sudo OS=${{ matrix.targets.OS }} DIST=${{ matrix.targets.DIST }} ARCH=${{ matrix.targets.ARCH }} pbuilder update --configfile pbuilderrc

      - name: Copy pbuilder image to cache dir
        run: |
          cp /var/cache/pbuilder/${{ matrix.targets.image }}-base.tgz cache/

  build:
    name: Build ${{ matrix.packages.name }} (${{ matrix.targets.image }})
    runs-on: ubuntu-latest
    needs: [prepare, setup]
    strategy:
      fail-fast: false
      matrix:
        targets: ${{ fromJSON(needs.prepare.outputs.targets) }}
        packages: ${{ fromJSON(needs.prepare.outputs.packages) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare directories
        run: |
          mkdir dl
          mkdir cache
          mkdir build_dir

      # dh-make and devscripts are only used for the package build
      - name: Install pbuilder, Debian tools, keyrings
        run: |
          sudo apt-get update
          sudo apt-get install -yq pbuilder qemu-user-static debian-archive-keyring devscripts dh-make

      - name: Restore pbuilder image
        id: cache-image
        uses: actions/cache@v5
        with:
          path: cache/${{ matrix.targets.image }}-base.tgz
          key: ${{ matrix.targets.image }}
          fail-on-cache-miss: true

      - name: Copy pbuilder image to work dir
        run: |
          sudo cp cache/${{ matrix.targets.image }}-base.tgz /var/cache/pbuilder/

      - name: Download source
        env:
          pkgname: ${{ matrix.packages.name }}
          version: ${{ matrix.packages.version }}
          owner: ${{ matrix.packages.owner }}
          repository: ${{ matrix.packages.repository }}
          commit: ${{ matrix.packages.commit }}
        run: |
          echo "Downloading from https://github.com/${owner}/${repository}/archive/${commit}.tar.gz to build_dir/${pkgname}_${version}.orig.tar.gz"
          wget -O build_dir/${pkgname}_${version}.orig.tar.gz https://github.com/${owner}/${repository}/archive/${commit}.tar.gz
          tar xzf build_dir/${pkgname}_${version}.orig.tar.gz --directory build_dir
          cp -a ${repository}/debian build_dir/${repository}-${commit}

      # The below uses a method of creating changelog and setting versions that
      # isn't very kosher. I don't know how to use the proper method while still
      # creating different packages for different distributions that can be
      # served from one repo.
      - name: Build package
        working-directory: build_dir/${{ matrix.packages.repository }}-${{ matrix.packages.commit }}
        env:
          pkgname: ${{ matrix.packages.name }}
          version: ${{ matrix.packages.version }}
          deb: ${{ matrix.packages.deb }}
          commit: ${{ matrix.packages.commit }}
          dist: ${{ matrix.targets.DIST }}
          os: ${{ matrix.targets.OS }}
          arch: ${{ matrix.targets.ARCH }}
          flags: ${{ matrix.targets.FLAGS }}
        run: |
          dch --create --package ${pkgname} --newversion ${version}-${deb}+${dist} --distribution ${dist} --force-distribution "Dummy changelog @commit ${commit}"
          sudo OS=${os} DIST=${dist} ARCH=${arch} DEB_BUILD_OPTIONS="parallel=$(nproc) nocheck" pdebuild --configfile ../../pbuilderrc ${flags}
          rm debian/changelog

      - name: Upload dpkg
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.packages.name }}_${{ matrix.targets.image }}
          path: /var/cache/pbuilder/result/${{ matrix.targets.image }}
